<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DESCO — Book a Table</title>
    <meta name="description" content="Reserve your dining table or walk-in lounge spot at DESCO.">
    <meta name="theme-color" content="#0E0E0E">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="icon" type="image/png" href="/public/logo-black.png">
    <link rel="apple-touch-icon" href="/public/logo-black.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof tailwind !== 'undefined') {
                tailwind.config = {
                    theme: {
                        extend: {
                            fontFamily: {
                                display: ['"DM Serif Display"', 'serif'],
                                sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
                            },
                        },
                    },
                };
            }
        });
    </script>

    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html { font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
        body { margin: 0; background: #0E0E0E; color: #f5f5f5; }

        /* Page transitions */
        #app {
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        @keyframes check {
            from { stroke-dashoffset: 30; }
            to { stroke-dashoffset: 0; }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease both;
        }
        .animate-fade-in-delay-1 {
            animation: fadeIn 0.5s ease 0.1s both;
        }
        .animate-fade-in-delay-2 {
            animation: fadeIn 0.5s ease 0.2s both;
        }
        .animate-slide-up {
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .animate-check svg path {
            stroke-dasharray: 30;
            animation: check 0.5s ease 0.3s both;
        }

        /* Date input styling */
        input[type="date"]::-webkit-calendar-picker-indicator {
            opacity: 0.4;
        }

        /* Checkbox styling */
        input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #444;
            border-radius: 6px;
            background: #1a1a1a;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        input[type="checkbox"]:focus {
            outline: none;
            box-shadow: none;
        }
        input[type="checkbox"]:checked {
            background: #f5f5f5;
            border-color: #f5f5f5;
        }
        input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 5px;
            width: 5px;
            height: 9px;
            border: solid #0E0E0E;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 0; }

        /* Selection */
        ::selection { background: rgba(26, 26, 26, 0.12); }

        /* Fix for mobile */
        input, button, textarea, select { font-family: inherit; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="./src/app.js"></script>
</body>
</html>
